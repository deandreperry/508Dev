<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg { fill: #ffffff; }
    .text { fill: #0a0a0b; }
    .dot { fill: #0071e3; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0a0a0b; }
      .text { fill: #ffffff; }
    }
  </style>

  <rect
    class="bg"
    width="64"
    height="64"
    rx="14"
  />

  <text
    x="50%"
    y="52%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="30"
    font-weight="800"
    letter-spacing="-1"
    class="text"
  >
    508
  </text>

  <circle
    class="dot"
    cx="51"
    cy="13"
    r="3.5"
  />
</svg>
